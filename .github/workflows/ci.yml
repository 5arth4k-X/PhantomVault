name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt check
        run: cargo fmt --manifest-path phantom_core/Cargo.toml -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path phantom_core/Cargo.toml -- -D warnings

      - name: cargo test (unit)
        run: cargo test --manifest-path phantom_core/Cargo.toml -- --test-threads=1

      - name: cargo test (integration)
        run: cargo test --manifest-path phantom_core/Cargo.toml --test integration_test -- --test-threads=1

      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          manifest-path: phantom_core/Cargo.toml

  python:
    name: Python Build and Import
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin
        run: pip install maturin==1.7.4

      - name: Build Python extension
        run: maturin build --manifest-path phantom_core/Cargo.toml

      - name: Install and verify
        run: |
          pip install target/wheels/*.whl
          python3 -c "from phantomvault import phantom_core; print('OK:', dir(phantom_core))"
